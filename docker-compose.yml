services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "8000"
    volumes:
      - sysvitals_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-mydomain.com}
    ports:
      # Defaults are suitable for a public Linux server.  Set HTTP_PORT and
      # HTTPS_PORT in .env to use non-privileged/local ports under WSL.
      - "${BIND_ADDRESS:-0.0.0.0}:${HTTP_PORT:-80}:80"
      - "${BIND_ADDRESS:-0.0.0.0}:${HTTPS_PORT:-443}:443"
      - "${BIND_ADDRESS:-0.0.0.0}:${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sysvitals_data:
  caddy_data:
  caddy_config:
