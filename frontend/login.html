<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SysVitals - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="wrap">

  <!-- GLOBAL HEADER -->
  <header>
    <div class="brand">
      <span class="eyebrow">// Thermal Watch</span>
      <h1>System Vitals Monitor</h1>
    </div>
    <div class="hostline">
      <span class="dot"></span>
      <span>waiting for auth…</span>
    </div>
  </header>

  <!-- AUTH SCREEN -->
  <div id="authContainer" class="auth-wrap">
    <div class="auth-card" id="loginCard">
      <div>
        <h2>Login</h2>
        <p>Access your devices and system vitals</p>
      </div>
      <div class="form-group">
        <label for="loginUser">Username</label>
        <input type="text" id="loginUser" class="form-input" placeholder="Enter username" />
      </div>
      <div class="form-group">
        <label for="loginPass">Password</label>
        <input type="password" id="loginPass" class="form-input" placeholder="Enter password" />
      </div>
      <button class="btn-submit" onclick="handleLogin()">Login</button>
      <div class="error-msg" id="loginError"></div>
      <div class="auth-toggle">
        Need an account? <span onclick="toggleAuth(false)">Create Account</span>
      </div>
    </div>

    <div class="auth-card" id="registerCard" style="display: none;">
      <div>
        <h2>Create Account</h2>
        <p>Register to monitor multiple devices</p>
      </div>
      <div class="form-group">
        <label for="regUser">Username</label>
        <input type="text" id="regUser" class="form-input" placeholder="Choose a username" />
      </div>
      <div class="form-group">
        <label for="regPass">Password</label>
        <input type="password" id="regPass" class="form-input" placeholder="Choose a password" />
      </div>
      <div class="form-group">
        <label for="regConfirm">Confirm Password</label>
        <input type="password" id="regConfirm" class="form-input" placeholder="Confirm password" />
      </div>
      <button class="btn-submit" onclick="handleRegister()">Create Account</button>
      <div class="error-msg" id="regError"></div>
      <div class="auth-toggle">
        Already have an account? <span onclick="toggleAuth(true)">Login</span>
      </div>
    </div>
  </div>

  <footer>SysVitals</footer>
</div>

<script src="js/app.js"></script>
</body>
</html>
